name: Deploy Backend to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: supa-cloud-app
  GAR_LOCATION: asia-southeast3
  REPOSITORY: my-repo
  IMAGE: my-docker-app
  REGION: asia-southeast3

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: 'projects/592825036602/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider-v2'
        service_account: 'github-actions-sa@supa-cloud-app.iam.gserviceaccount.com'

    - name: Docker Auth
      run: |-
        gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev"

    - name: Build and Push Container
      run: |-
        docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" ./backend
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: 'backend-api'
        region: '${{ env.REGION }}'
        image: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}'
        env_vars: |-
          DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
